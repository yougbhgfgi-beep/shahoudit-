            10% { transform: translate(-50%, 0); opacity: 1; }
            90% { transform: translate(-50%, 0); opacity: 1; }

        @keyframes twinkle {

            50% { opacity: 1; transform: scale(1.2) drop-shadow(0 0 5px white); }

        .star { animation: twinkle infinite ease-in-out; }

        @keyframes shootingStar {

        // --- Components ---
        
        // Floating Hearts Background
        function BackgroundHearts() {
            const [hearts, setHearts] = useState([]);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    const id = Math.random();
                    const left = Math.random() * 100;
                    const size = Math.random() * (30 - 15) + 15;
                    const duration = Math.random() * (20 - 10) + 10;
                    
                    setHearts(prev => [...prev, { id, left, size, duration }]);
                    
                    setTimeout(() => {
                        setHearts(prev => prev.filter(h => h.id !== id));
                    }, duration * 1000);
                }, 1500);
                
                return () => clearInterval(interval);
            }, []);
            
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-[45]">
                    {hearts.map(h => (
                        <div 
                            key={h.id} 
                            className="absolute bottom-[-50px] animate-drift"
                            style={{ 
                                left: `${h.left}%`, 
                                animationDuration: `${h.duration}s` 
                            }}
                        >
                            <Heart size={h.size} fill="#fb7185" className="opacity-40" />
                        </div>
                    ))}
                </div>
            );
        }

        // Removed LoveMeter

        // --- Notification Audio Synthesizer ---
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) { console.log(e); }
        };

        function LoveWebsite() {
            const [isLoading, setIsLoading] = useState(true);
            const [isLogged, setIsLogged] = useState(false);
            const [day, setDay] = useState("");
            const [month, setMonth] = useState("");
            const [year, setYear] = useState("");

            const playlist = [

            ];

            useEffect(() => {
                if (isLogged && isPlaying && audioRef.current) {
                    audioRef.current.play().catch(e => console.log(e));
                }
            }, [currentSongIndex]);
            
            const handleSongEnd = () => {
                setCurrentSongIndex((prev) => (prev + 1) % playlist.length);
            };

            // Click Effect Manager
            useEffect(() => {
                const handleClick = (e) => {
                    const id = Date.now() + Math.random();
                    setClickHearts(prev => [...prev.slice(-15), { id, x: e.clientX, y: e.clientY }]);

                        setClickHearts(prev => prev.filter(h => h.id !== id));
                    }, 1000);
                };
                window.addEventListener('click', handleClick);
                return () => window.removeEventListener('click', handleClick);
            }, []);

            const loveStartDate = new Date("2009-04-06T00:00:00");
            const meetStartDate = new Date("2025-01-23T00:00:00");

            const loveMessagesQuotes = [
                "كل سنة وانتي طيبة يا أجمل بنوتة في الدنيا 🎂💖",
                "كل سنة وانتي منورة حياتنا ✨",

                "انتي الفرحة اللي دخلت حياتنا 💖",
                "يوم ميلادك هو أسعد يوم في السنة 🍯",
                "يا رب سنة سعيدة عليكي مليانة ضحك وفرح 💌",
                "كل سنة وانتي أحلى بنوتة في الكون 💘",
                "عقبال 100 سنة يا روحي 🎉♥️"

            useEffect(() => {
                setTimeout(() => setIsLoading(false), 4500); // loading delay

            useEffect(() => {

                    const notifyInt = setInterval(() => {
                        const randomMsg = loveMessagesQuotes[Math.floor(Math.random() * loveMessagesQuotes.length)];
                        setActiveNotification(randomMsg);
                        playBeep();
                        setTimeout(() => setActiveNotification(null), 4000); // hide after 4 seconds
                    }, 10000);
                    return () => clearInterval(notifyInt);
                }
            }, [isLogged, isLoading]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    
                    const diff = now - loveStartDate;
                    const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
                    setTimeTogether({
                        years: Math.floor(totalDays / 365),
                        months: Math.floor((totalDays % 365) / 30),
                        days: totalDays % 30,
                        hours: Math.floor(diff / (1000 * 60 * 60)) % 24,
                        minutes: Math.floor(diff / (1000 * 60)) % 60,
                        seconds: Math.floor(diff / 1000) % 60
                    });

                    const diffMet = now - meetStartDate;
                    const totalDaysMet = Math.floor(diffMet / (1000 * 60 * 60 * 24));
                    setTimeMet({
                        years: Math.floor(totalDaysMet / 365),
                        months: Math.floor((totalDaysMet % 365) / 30),
                        days: totalDaysMet % 30,
                        hours: Math.floor(diffMet / (1000 * 60 * 60)) % 24,
                        minutes: Math.floor(diffMet / (1000 * 60)) % 60,
                        seconds: Math.floor(diffMet / 1000) % 60

                return () => clearInterval(interval);

            const handleLogin = () => {

                    setTimeout(() => {

                        }

                    }, 500);
                } else {

            const toggleAudio = () => {

                else audioRef.current.play();

                        <div className="relative z-10 chic-login-card p-8 md:p-16 rounded-[3rem] md:rounded-[4rem] text-center text-white max-w-md w-[90%] overflow-hidden group border-t border-l border-white/20">
                           <div className="absolute -top-20 -right-20 w-40 h-40 bg-pink-500/20 rounded-full blur-3xl group-hover:bg-pink-500/30 transition-all duration-700"></div>
                           <div className="absolute -bottom-20 -left-20 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl group-hover:bg-indigo-500/30 transition-all duration-700"></div>
                           
                            <div className="mb-10 flex justify-center scale-125">

                            <h1 className="text-4xl font-extrabold mb-4 font-sans tracking-tight text-white drop-shadow-2xl text-center">Shahoudit Kalby 🎂</h1>

                    <audio

                    <BackgroundHearts />
                    
                    {activeNotification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] md:w-auto notification-anim">
                            <div className="bg-slate-900/80 backdrop-blur-xl border border-rose-500/50 shadow-[0_0_30px_rgba(244,63,94,0.3)] text-rose-100 px-6 py-4 rounded-2xl flex items-center justify-between gap-4 relative overflow-hidden">
                                <div className="absolute inset-0 bg-gradient-to-r from-transparent via-rose-500/10 to-transparent translate-x-[-100%] animate-[shimmer_2s_infinite]"></div>
                                <span className="bg-rose-500/20 p-2 rounded-full text-xl z-10">🔔</span>

            useEffect(() => {
                localStorage.setItem('romantic_chat_v2', JSON.stringify(messages));
                scrollToBottom();

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });

                                    <div className="bg-white border border-slate-200 self-start rounded-2xl rounded-br-sm p-3 shadow-sm w-16 h-10 flex items-center justify-center gap-1.5 text-slate-800">
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "0ms"}}></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "150ms"}}></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "300ms"}}></div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} className="pb-2 text-transparent">.</div>
                            </div>

                            {/* Input Area */}
                            <div className="bg-white p-3 flex items-center gap-2 border-t border-slate-200">
                                <div className="flex-1 bg-slate-100 rounded-full flex items-center px-4 py-2 border border-slate-200">
                                    <input 
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                        placeholder="اكتب رسالة لحبيبك..."
                                        className="flex-1 outline-none border-none bg-transparent text-slate-800 placeholder-slate-400 text-sm md:text-base w-full"
                                    />
                                </div>
                                <button 
                                    onClick={handleSend}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center shadow-md transition-colors ${input.trim() ? 'bg-rose-600 hover:bg-rose-700' : 'bg-slate-300'} text-white shrink-0`}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" className="mr-1 -ml-1"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoveWebsite />);
    </script>
</body>

</html>
